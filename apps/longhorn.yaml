---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: homelab-config
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  sources:
    - chart: longhorn
      repoURL: https://charts.longhorn.io/
      targetRevision: v1.12.0
      helm:
        valuesObject:
          preUpgradeChecker:
            jobEnabled: false
          defaultSettings:
            # Number of replicas, we have only 2 nodes
            defaultReplicaCount: 2
            # Upgrade checker
            upgradeChecker: false
          persistence:
            defaultClass: true
            defaultFsType: ext4
            defaultClassReplicaCount: 2
            reclaimPolicy: Delete
